<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Steven + Mina Watchlist</title>
  <style>
    :root {
      --text: #f8f3ff;
      --muted: rgba(248,243,255,.78);
      --line: rgba(255,255,255,.14);
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,151,219,.25), transparent 22%),
        radial-gradient(circle at 80% 12%, rgba(135,245,255,.22), transparent 22%),
        radial-gradient(circle at 70% 70%, rgba(255,255,255,.13), transparent 10%),
        linear-gradient(180deg, #120322 0%, #291158 35%, #51217f 74%, #201447 100%);
      background-attachment: fixed;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 14px 40px;
    }
    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
    }
    .hero {
      padding: 24px 20px 16px;
    }
    .title {
      margin: 0;
      font-size: clamp(34px, 6vw, 60px);
      line-height: 1.03;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #ff99da 0%, #fff1f7 25%, #aaf8ff 56%, #f7a7ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .top-links {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
      padding: 12px 16px;
      font-size: 15px;
    }
    .panel {
      margin-top: 20px;
      padding: 22px;
      background:
        radial-gradient(circle at 78% 8%, rgba(255,120,209,.18), transparent 26%),
        linear-gradient(180deg, rgba(119,66,208,.40), rgba(58,34,124,.48));
    }
    .section-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
    }
    .section-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 16px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      padding-bottom: 14px;
    }
    .controls {
      margin-top: 20px;
      display: grid;
      grid-template-columns: minmax(180px,1.2fr) minmax(140px,.8fr) minmax(140px,.8fr) auto;
      gap: 12px;
      align-items: center;
    }
    .control, .select {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(39,20,94,.58);
      color: var(--text);
      font-size: 16px;
      padding: 14px 16px;
      outline: none;
    }
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 15px;
    }
    .switch {
      position: relative;
      width: 72px;
      height: 38px;
      display: inline-block;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,.20), rgba(255,255,255,.08));
      border: 1px solid rgba(255,255,255,.18);
      transition: .2s ease;
    }
    .slider::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 4px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 6px 16px rgba(0,0,0,.24);
      transition: .2s ease;
    }
    .switch input:checked + .slider {
      background: linear-gradient(90deg, rgba(80,255,196,.55), rgba(103,190,255,.55));
    }
    .switch input:checked + .slider::before { transform: translateX(34px); }
    .count-pill {
      display: inline-flex;
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: var(--muted);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
    }
    .list-box {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 1.7fr .5fr 1.2fr .7fr;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
    }
    .row.header {
      font-weight: 800;
      background: rgba(255,255,255,.08);
    }
    .muted { color: var(--muted); }
    .tag {
      display: inline-flex;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 11px;
      margin-right: 6px;
    }
    .empty {
      display: none;
      margin-top: 16px;
      padding: 18px;
      border-radius: 16px;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
    }
    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr; }
      .toggle-wrap { justify-content: flex-start; }
      .row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .row.header { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero glass">
      <h1 class="title">Steven + Mina Watchlist</h1>
      <div class="top-links">
        <a class="btn" href="https://www.imdb.com/user/ur42352318/watchlist/" target="_blank" rel="noreferrer">Open Steven's IMDb List</a>
        <a class="btn" href="https://letterboxd.com/miscalim/watchlist/" target="_blank" rel="noreferrer">Open Mina's Letterboxd List</a>
      </div>
    </div>

    <section class="panel glass">
      <h2 class="section-title">Saved Reference Data</h2>
      <div class="section-sub">Loaded from pasted static data, no live scraping</div>

      <div class="controls">
        <input id="searchBox" class="control" type="text" placeholder="Search...">
        <select id="genreFilter" class="select">
          <option value="">Genre</option>
        </select>
        <select id="sortBy" class="select">
          <option value="year_desc">Year, newest</option>
          <option value="year_asc">Year, oldest</option>
          <option value="title_asc">Title, A to Z</option>
          <option value="title_desc">Title, Z to A</option>
        </select>
        <div class="toggle-wrap">
          <label class="switch">
            <input id="onlyOverlap" type="checkbox" checked>
            <span class="slider"></span>
          </label>
          <span>Only Overlap</span>
        </div>
      </div>

      <div class="count-pill"><span id="resultCount">0</span> shown</div>

      <div class="list-box" id="listBox">
        <div class="row header">
          <div>Title</div>
          <div>Year</div>
          <div>Genres</div>
          <div>Sources</div>
        </div>
      </div>

      <div id="emptyState" class="empty">No movies match the current filters.</div>
    </section>
  </div>

  <script>
    const movies = [
      { title: "28 Years Later: The Bone Temple", year: "2026", genres: "Horror, Sci-Fi, Thriller", on_imdb: true, on_letterboxd: true, is_overlap: true },
      { title: "A Real Pain", year: "2024", genres: "Comedy, Drama", on_imdb: true, on_letterboxd: true, is_overlap: true },
      { title: "Beyond the Black Rainbow", year: "2010", genres: "Horror, Mystery, Sci-Fi", on_imdb: true, on_letterboxd: true, is_overlap: true },
      { title: "Chungking Express", year: "1994", genres: "Comedy, Crime, Drama, Mystery, Romance", on_imdb: true, on_letterboxd: true, is_overlap: true },
      { title: "Malignant", year: "2021", genres: "Crime, Horror, Mystery", on_imdb: true, on_letterboxd: true, is_overlap: true },
      { title: "Possessor", year: "2020", genres: "Horror, Mystery, Sci-Fi, Thriller", on_imdb: true, on_letterboxd: true, is_overlap: true },
      { title: "The Parallax View", year: "1974", genres: "Drama, Mystery, Thriller", on_imdb: true, on_letterboxd: true, is_overlap: true },
      { title: "The Phoenician Scheme", year: "2025", genres: "Action, Comedy, Crime, Drama, Thriller", on_imdb: true, on_letterboxd: true, is_overlap: true },

      { title: "10 Cloverfield Lane", year: "2016", genres: "Science Fiction, Thriller, Horror, Drama", on_imdb: false, on_letterboxd: true, is_overlap: false },
      { title: "Abigail", year: "2024", genres: "Horror, Thriller", on_imdb: false, on_letterboxd: true, is_overlap: false },
      { title: "Amer", year: "2009", genres: "Thriller, Horror", on_imdb: false, on_letterboxd: true, is_overlap: false },

      { title: "Agatha All Along", year: "2024", genres: "Action, Adventure, Comedy, Drama, Fantasy, Sci-Fi", on_imdb: true, on_letterboxd: false, is_overlap: false },
      { title: "Akira", year: "1988", genres: "Animation, Action, Drama, Fantasy, Sci-Fi", on_imdb: true, on_letterboxd: false, is_overlap: false },
      { title: "Alphaville", year: "1965", genres: "Comedy, Drama, Mystery, Sci-Fi, Thriller", on_imdb: true, on_letterboxd: false, is_overlap: false }
    ];

    const listBox = document.getElementById('listBox');
    const searchBox = document.getElementById('searchBox');
    const genreFilter = document.getElementById('genreFilter');
    const sortBy = document.getElementById('sortBy');
    const onlyOverlap = document.getElementById('onlyOverlap');
    const countEl = document.getElementById('resultCount');
    const emptyState = document.getElementById('emptyState');

    function uniqueGenres(items) {
      const set = new Set();
      items.forEach(movie => {
        (movie.genres || "").split(",").forEach(g => {
          const clean = g.trim();
          if (clean) set.add(clean);
        });
      });
      return Array.from(set).sort((a, b) => a.localeCompare(b));
    }

    function buildGenreOptions() {
      uniqueGenres(movies).forEach(genre => {
        const opt = document.createElement("option");
        opt.value = genre.toLowerCase();
        opt.textContent = genre;
        genreFilter.appendChild(opt);
      });
    }

    function yearNum(movie) {
      const y = parseInt(movie.year || "0", 10);
      return Number.isNaN(y) ? 0 : y;
    }

    function filteredMovies() {
      const q = (searchBox.value || "").trim().toLowerCase();
      const genre = (genreFilter.value || "").trim().toLowerCase();
      const overlapOnly = onlyOverlap.checked;

      return movies.filter(movie => {
        const title = (movie.title || "").toLowerCase();
        const genres = (movie.genres || "").toLowerCase();

        if (q && !title.includes(q)) return false;
        if (genre && !genres.includes(genre)) return false;
        if (overlapOnly && !movie.is_overlap) return false;
        return true;
      });
    }

    function sortedMovies(items) {
      const mode = sortBy.value;
      return [...items].sort((a, b) => {
        if (mode === "year_asc") return yearNum(a) - yearNum(b) || a.title.localeCompare(b.title);
        if (mode === "title_asc") return a.title.localeCompare(b.title);
        if (mode === "title_desc") return b.title.localeCompare(a.title);
        return yearNum(b) - yearNum(a) || a.title.localeCompare(b.title);
      });
    }

    function sourceTags(movie) {
      let html = "";
      if (movie.on_imdb) html += '<span class="tag">IMDb</span>';
      if (movie.on_letterboxd) html += '<span class="tag">Letterboxd</span>';
      return html;
    }

    function renderRows() {
      document.querySelectorAll(".movie-data-row").forEach(el => el.remove());

      const items = sortedMovies(filteredMovies());
      countEl.textContent = items.length;
      emptyState.style.display = items.length ? "none" : "block";

      items.forEach(movie => {
        const row = document.createElement("div");
        row.className = "row movie-data-row";
        row.innerHTML = `
          <div>${movie.title}</div>
          <div class="muted">${movie.year || ""}</div>
          <div class="muted">${movie.genres || ""}</div>
          <div>${sourceTags(movie)}</div>
        `;
        listBox.appendChild(row);
      });
    }

    [searchBox, genreFilter, sortBy, onlyOverlap].forEach(el => {
      el.addEventListener("input", renderRows);
      el.addEventListener("change", renderRows);
    });

    buildGenreOptions();
    renderRows();
  </script>
</body>
</html>
